name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master  # Odpalenie przy każdym pushu do branchy master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    environment:
      name: docker.io
      url: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/napiprojekt-stremio-addon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Odczytanie wersji z pliku
      - name: Read version
        id: get_version
        run: |
          VERSION=$(cat version | tr -d "\n")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/napiprojekt-stremio-addon:${{ steps.get_version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/napiprojekt-stremio-addon:latest
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest